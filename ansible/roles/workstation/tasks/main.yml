- name: add ssh key to user simone
  authorized_key:
    user: simone
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEfBmuHajI9MM7HCITCnfvHo77BFBXV+41diyCICwzYX ansible"

- name: change line in a file
  lineinfile:
    path: /etc/httpd/conf/httpd.conf
    regexp: "^serveradmin"
    line: serveradmin test@ansible.com
  notify: restart_apache
 
- name: generate configfile form template
  template: 
    src: "{{ssh_template_file}}"
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: 0644
  notify: restart_sshd
  
