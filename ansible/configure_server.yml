- hosts: all
  become: true
  tasks: 
  
  - name: install http and ftp package 
    tags: tag1
    package:
      name: 
        - "{{http_server}}"
        - "{{ftp_server}}"
      update_cache: true
    when: ansible_distribution == "Fedora" 

- hosts: web_file_server
  become: true
  tasks:
    - name: install ftp and http packages
      tags: tag2
      package:
        name:
          - httpd
          - vsftpd 
        state: latest
        update_cache: true
    
    - name: copy pages for web server
      tags: http
      copy:
        src: index.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: 0644

    - name: start http service
      service:
        name: httpd
        state: started
        enabled: true

- hosts: workstation
  become: true
  tasks:
    - name: install zip tool
      package: 
        name: 
          - unzip

    - name: install terraform
      package:
        name:
          - terraform
        update_cache: true

    - name: change line in a file
      lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: "^serveradmin"
        line: serveradmin test@ansible.com 
      register: apache  
      
    - name: restart server on change
      service:
         name: httpd
         state: restarted
      when: apache.changed
